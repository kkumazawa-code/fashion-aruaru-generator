                                                                                                                                                                                                                                                                                                                                            ESCAPED=$(python3 -c "import sys,json; print(json.dumps(open('result.txt').read()))")
                                                                                                                                                                                                                                                                                                                                                      curl -s -X POST "$SLACK_WEBHOOK_URL" \

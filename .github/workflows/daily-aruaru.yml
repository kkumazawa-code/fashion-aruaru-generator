name: Daily Fashion Aruaru Generator

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Fashion Aruaru Ideas
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b-versatile","messages":[{"role":"system","content":"Instagram/TikTok向けファッション4コマ漫画のネタ作家。20〜30代女性向けの共感できるあるあるを作る。"},{"role":"user","content":"ファッションあるあるネタを10個。ルール：主人公は女性一人のみ。4コマ完結。4コマ目に予想外のオチ。日常の場面。セリフは短く口語的。重複NG：冬の静電気地獄、お直しに出したまま、ネット購入の賭け、タグが邪魔、同じ服かぶり、サイズの罠、ファスナーが上がらない、ポケットがない問題、季節を読み間違えた、着替えが間に合わない、雨の日のコーデ、洗濯したら縮んだ、プチプラのはずが、褒められた服しか着ない、サイズが迷子。フォーマット：番号. タイトル 1コマ:場面 2コマ:場面 3コマ:場面 4コマ:オチ セリフ1「」セリフ2「」セリフ3「」セリフ4「」"}],"max_tokens":4096}')
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data['choices'][0]['message']['content'])
          " > result.txt
          cat result.txt

      - name: Send Email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          export TODAY=$(date '+%Y/%m/%d' -d '+9 hours')
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          sender = 'volleyball.kumakuma@gmail.com'
          msg = MIMEMultipart()
          msg['Subject'] = '👗 ' + os.environ['TODAY'] + ' のファッションあるあるネタ10選'
          msg['From'] = sender
          msg['To'] = sender
          msg.attach(MIMEText(open('result.txt').read(), 'plain', 'utf-8'))
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(sender, os.environ['GMAIL_APP_PASSWORD'])
              smtp.send_message(msg)
          print('Email sent!')
          "

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: aruaru-${{ github.run_id }}
          path: result.txt
          retention-days: 30

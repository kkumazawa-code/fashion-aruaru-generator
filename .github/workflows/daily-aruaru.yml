name: Daily Fashion Aruaru Generator

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Fashion Aruaru Ideas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [{
                "parts": [{
                  "text": "あなたはInstagram/TikTok向けファッション4コマ漫画シリーズのネタ出し担当です。今日のファッションあるあるネタを3個考えてください。フォーマット：1. タイトル → オチ"
                }]
              }]
            }')
          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE"
          echo "=== PARSE ==="
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if 'candidates' in data:
            print(data['candidates'][0]['content']['parts'][0]['text'])
          elif 'error' in data:
            print('ERROR:', data['error']['message'])
          else:
            print('UNKNOWN RESPONSE:', list(data.keys()))
          " > result.txt
          cat result.txt

      - name: Send Email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          TODAY=$(date '+%Y/%m/%d' -d '+9 hours')
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          sender = 'volleyball.kumakuma@gmail.com'
          receiver = 'volleyball.kumakuma@gmail.com'
          password = os.environ['GMAIL_APP_PASSWORD']
          today = os.environ['TODAY']
          result = open('result.txt').read()

          msg = MIMEMultipart()
          msg['Subject'] = f'👗 {today} のファッションあるあるネタ10選'
          msg['From'] = sender
          msg['To'] = receiver
          msg.attach(MIMEText(result, 'plain', 'utf-8'))

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(sender, password)
              smtp.send_message(msg)
          print('Email sent!')
          " TODAY="$TODAY"

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: aruaru-${{ github.run_id }}
          path: result.txt
          retention-days: 30
